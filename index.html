<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FARMBOARD ULTRA - Greenland</title>
    <style>
        /* Menghilangkan margin dan mengunci ukuran layar agar tidak bisa di-zoom out */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #2D9596; /* Warna khas Greenland */
            touch-action: manipulation;
        }

        /* Iframe dibuat memenuhi seluruh layar (Full Screen) */
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- 
        GANTI URL DI BAWAH DENGAN LINK WEB APP (DEPLOYMENT) TERBARU KAMU.

</html>
